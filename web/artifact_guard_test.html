<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>誤補正ガード テスト</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef2f5;
      --panel: #ffffff;
      --ink: #1d2733;
      --muted: #617083;
      --line: #d6dde6;
      --after: #1f7a8c;
      --before: #202a36;
      --warn: #b7791f;
      --danger: #b42318;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    h1 {
      margin: 0;
      font-size: 20px;
      letter-spacing: 0;
    }
    header a {
      color: var(--after);
      font-weight: 650;
      text-decoration: none;
    }
    main {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 14px;
      padding: 14px;
    }
    aside,
    section {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }
    aside {
      padding: 14px;
    }
    .field {
      margin-bottom: 12px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-size: 13px;
      font-weight: 700;
    }
    input,
    select,
    button {
      width: 100%;
      font: inherit;
    }
    input[type="file"],
    input[type="number"],
    select {
      padding: 8px 9px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
    }
    input[type="range"] {
      accent-color: var(--after);
    }
    .two {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
    }
    button {
      padding: 11px 14px;
      border: 0;
      border-radius: 6px;
      background: var(--after);
      color: #fff;
      font-weight: 800;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.65;
      cursor: wait;
    }
    .note {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 13px;
    }
    .status {
      min-height: 38px;
      margin: 12px 0 0;
      color: var(--muted);
      white-space: pre-wrap;
      font-size: 13px;
    }
    .status.error { color: var(--danger); }
    .viewer {
      min-width: 0;
      padding: 14px;
    }
    .tools {
      display: grid;
      grid-template-columns: 1fr 160px;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
    }
    .swatch {
      width: 12px;
      height: 12px;
      border-radius: 2px;
    }
    .swatch.after { background: var(--after); }
    .swatch.before { background: var(--before); }
    .swatch.mask { background: #ffe100; }
    .compare {
      --split: 50%;
      position: relative;
      overflow: hidden;
      width: 100%;
      min-height: 520px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #101820;
    }
    .compare.has-result {
      min-height: 0;
    }
    .placeholder {
      display: grid;
      place-items: center;
      min-height: 520px;
      padding: 24px;
      color: #cbd5df;
      text-align: center;
    }
    .compare img {
      display: block;
      width: 100%;
      height: auto;
      max-height: 78vh;
      object-fit: contain;
      background: #101820;
    }
    .before-layer {
      position: relative;
      z-index: 1;
    }
    .after-layer {
      position: absolute;
      inset: 0;
      z-index: 2;
      width: 100%;
      height: 100%;
      max-height: none;
      object-fit: contain;
      clip-path: inset(0 calc(100% - var(--split)) 0 0);
      pointer-events: none;
    }
    .divider {
      position: absolute;
      top: 0;
      bottom: 0;
      left: var(--split);
      z-index: 4;
      width: 2px;
      background: #fff;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.35);
      pointer-events: none;
    }
    .badge {
      position: absolute;
      z-index: 5;
      top: 12px;
      padding: 7px 10px;
      border-radius: 4px;
      color: #fff;
      font-size: 13px;
      font-weight: 800;
      pointer-events: none;
    }
    .badge.after {
      left: 12px;
      background: rgba(31, 122, 140, 0.94);
    }
    .badge.before {
      right: 12px;
      background: rgba(32, 42, 54, 0.9);
    }
    .panels {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 12px;
    }
    .panel {
      min-width: 0;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }
    .panel h2 {
      margin: 0 0 8px;
      font-size: 13px;
    }
    .panel img {
      display: block;
      width: 100%;
      max-height: 240px;
      object-fit: contain;
      background: #101820;
    }
    pre {
      max-height: 240px;
      overflow: auto;
      margin: 0;
      padding: 10px;
      border-radius: 6px;
      background: #f7f9fb;
      font-size: 12px;
    }
    @media (max-width: 980px) {
      main { grid-template-columns: 1fr; }
      .panels { grid-template-columns: 1fr; }
      .tools { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>誤補正ガード テスト</h1>
    <a href="/index.html">汎用テストUI</a>
  </header>

  <main>
    <aside>
      <form id="repairForm">
        <div class="field">
          <label for="image">補正を掛けるファイル</label>
          <input id="image" name="image" type="file" accept=".png,.tif,.tiff,.jpg,.jpeg,image/*" required>
        </div>
        <div class="field">
          <label for="mask">白黒マスクPNG</label>
          <input id="mask" name="mask" type="file" accept=".png,image/png,image/*" required>
        </div>

        <input type="hidden" name="method" value="aggressive">
        <input type="hidden" name="mask_channel" value="grayscale">

        <div class="two">
          <div class="field">
            <label for="threshold">threshold</label>
            <input id="threshold" name="threshold" type="number" min="0" max="1" step="0.01" value="0.5">
          </div>
          <div class="field">
            <label for="strength">strength</label>
            <input id="strength" name="strength" type="number" min="0" max="1" step="0.05" value="1.0">
          </div>
        </div>

        <div class="two">
          <div class="field">
            <label for="dilate_radius">dilate</label>
            <input id="dilate_radius" name="dilate_radius" type="number" min="0" step="1" value="1">
          </div>
          <div class="field">
            <label for="feather_radius">feather</label>
            <input id="feather_radius" name="feather_radius" type="number" min="0" step="1" value="1">
          </div>
        </div>

        <div class="two">
          <div class="field">
            <label for="padding">padding</label>
            <input id="padding" name="padding" type="number" min="0" step="1" value="32">
          </div>
          <div class="field">
            <label for="max_component_area">max area</label>
            <input id="max_component_area" name="max_component_area" type="number" min="1" step="1" value="200000">
          </div>
        </div>

        <div class="field">
          <label for="min_component_area">min area</label>
          <input id="min_component_area" name="min_component_area" type="number" min="0" step="1" value="1">
        </div>

        <button id="runButton" type="submit">ガード付き強補正を実行</button>
        <p class="note">method は `aggressive` 固定です。白地に黒いシミが出る副作用を検査するための画面です。</p>
        <p id="status" class="status"></p>
      </form>
    </aside>

    <section class="viewer">
      <div class="tools">
        <div class="legend">
          <span class="pill"><span class="swatch after"></span>左: 補正後 guarded</span>
          <span class="pill"><span class="swatch before"></span>右: 補正前</span>
          <span class="pill"><span class="swatch mask"></span>Mask/Diff は下段</span>
        </div>
        <input id="split" type="range" min="0" max="100" value="50" aria-label="比較スライダー">
      </div>

      <div id="compare" class="compare">
        <div class="placeholder">画像と白黒マスクを選択して実行してください。</div>
      </div>

      <div class="panels">
        <div class="panel">
          <h2>Binary Mask</h2>
          <img id="maskPreview" alt="">
        </div>
        <div class="panel">
          <h2>Diff</h2>
          <img id="diffPreview" alt="">
        </div>
        <div class="panel">
          <h2>Metrics</h2>
          <pre id="metrics">{}</pre>
        </div>
      </div>
    </section>
  </main>

  <script>
    const form = document.getElementById("repairForm");
    const statusEl = document.getElementById("status");
    const button = document.getElementById("runButton");
    const compare = document.getElementById("compare");
    const split = document.getElementById("split");
    const maskPreview = document.getElementById("maskPreview");
    const diffPreview = document.getElementById("diffPreview");
    const metricsEl = document.getElementById("metrics");

    split.addEventListener("input", () => {
      compare.style.setProperty("--split", `${split.value}%`);
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      statusEl.classList.remove("error");
      statusEl.textContent = "処理中です。大きい画像では時間がかかります。";
      button.disabled = true;

      try {
        const data = new FormData(form);
        const response = await fetch("/api/repair", { method: "POST", body: data });
        const payload = await response.json();
        if (!response.ok || !payload.ok) {
          throw new Error(payload.error || "repair failed");
        }
        renderResult(payload);
        const outside = payload.metrics.max_abs_diff_outside_mask;
        statusEl.textContent = `完了: run ${payload.run_id}\nmask外最大差分: ${outside}`;
      } catch (error) {
        statusEl.classList.add("error");
        statusEl.textContent = String(error.message || error);
      } finally {
        button.disabled = false;
      }
    });

    function renderResult(payload) {
      const cache = `?t=${Date.now()}`;
      compare.classList.add("has-result");
      compare.style.setProperty("--split", `${split.value}%`);
      compare.innerHTML = `
        <img class="before-layer" src="${payload.input_url}${cache}" alt="補正前">
        <img class="after-layer" src="${payload.repaired_url}${cache}" alt="補正後 guarded">
        <div class="badge after">補正後 guarded</div>
        <div class="badge before">補正前</div>
        <div class="divider"></div>
      `;
      maskPreview.src = `${payload.mask_url}${cache}`;
      diffPreview.src = `${payload.diff_url}${cache}`;
      metricsEl.textContent = JSON.stringify(payload.metrics, null, 2);
    }
  </script>
</body>
</html>
